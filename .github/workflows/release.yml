name: Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 のようなタグがプッシュされたときに動作

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリースを作成するために必要

    steps:
      # 1. ソースコードの取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Go の環境セットアップ
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # 3. Windows向け実行ファイルのビルド (管理者権限不要でGUIを非表示にする設定)
      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -H windowsgui" -o sr-changer.exe main.go

      # 4. GitHub Release の自動作成とファイルのアップロード
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists. Uploading asset..."
            gh release upload ${{ github.ref_name }} sr-changer.exe --clobber
          else
            echo "Creating new release ${{ github.ref_name }}..."
            gh release create ${{ github.ref_name }} \
              --title "Release ${{ github.ref_name }}" \
              --generate-notes \
              sr-changer.exe
          fi
